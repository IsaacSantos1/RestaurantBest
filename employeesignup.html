<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Signup</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <nav class="nav">
    <a href="home.html"><img src="Assets/logo.png" alt="Parrilla Mexicana Logo"></a>
    <ul class="navul">
      <li><a href="employeelogin.html">Log In</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <form class="form-card" id="signupForm">
      <h1>Employee Signup</h1>

      <label for="username">Username</label>
      <input id="username" type="text" required>

      <label for="email">Email</label>
      <input id="email" type="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" minlength="6" required>

      <label for="occupation">Occupation</label>
      <select id="occupation" required>
        <option value="">Select Occupation</option>
        <option value="waiter">Waiter/Waitress</option>
        <option value="chef">Chef</option>
        <option value="management">Management</option>
      </select>

      <button type="submit">Sign Up</button>
      <p id="signupStatus" class="status-message"></p>
    </form>
  </main>

  <footer class="footer">
    <img src="Assets/logo.png" alt="Parrilla Mexicana Logo" class="footer-image">
    <ul class="footerul">
      <li><a href="employeelogin.html">Jobs</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </footer>

  <script type="module" src="employeesignup.js"></script>
</body>
</html>
