<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <nav class="nav">
    <a href="home.html"><img src="Assets/logo.png" alt="Parrilla Mexicana Logo"></a>
    <ul class="navul">
      <li><a href="home.html">Home</a></li>
      <li><a href="order.html">Order Now</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <form class="form-card" id="checkoutForm">
      <h1>Complete Your Order</h1>

      <label for="name">Full Name</label>
      <input id="name" type="text" required>

      <label for="email">Email Address</label>
      <input id="email" type="email" required>

      <label for="phone">Phone Number</label>
      <input id="phone" type="tel" required>

      <label for="address">Address</label>
      <input id="address" type="text" required>

      <label for="city">City</label>
      <input id="city" type="text" required>

      <label for="state">State</label>
      <input id="state" type="text" required>

      <label for="zip">Zip Code</label>
      <input id="zip" type="text" required>

      <h2 id="checkoutTotal">Total: $0.00</h2>

      <button type="submit">Place Order</button>
      <p id="checkoutStatus" class="status-message"></p>
    </form>
  </main>

  <footer class="footer">
    <img src="Assets/logo.png" alt="Parrilla Mexicana Logo" class="footer-image">
    <ul class="footerul">
      <li><a href="employeelogin.html">Jobs</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </footer>

  <script type="module" src="checkout.js"></script>
</body>
</html>
