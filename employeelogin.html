<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Login</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <nav class="nav">
    <a href="home.html"><img src="Assets/logo.png" alt="Parrilla Mexicana Logo"></a>
    <ul class="navul">
      <li><a href="employeesignup.html">Sign Up</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <form class="form-card" id="loginForm">
      <h1>Employee Login</h1>

      <label for="email">Email</label>
      <input id="email" type="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" required>

      <button type="submit">Log In</button>
      <p id="loginStatus" class="status-message"></p>
    </form>
  </main>

  <footer class="footer">
    <img src="Assets/logo.png" alt="Parrilla Mexicana Logo" class="footer-image">
    <ul class="footerul">
      <li><a href="employeelogin.html">Jobs</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </footer>

  <script type="module" src="employeelogin.js"></script>
</body>
</html>
