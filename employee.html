<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Portal</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <nav class="nav">
    <a href="home.html"><img src="Assets/logo.png" alt="Parrilla Mexicana Logo"></a>
    <ul class="navul">
      <li><a href="home.html">Home</a></li>
      <li><a href="order.html">Order Now</a></li>
      <li><a href="employeelogin.html">Employee Login</a></li>
    </ul>
  </nav>

  <div class="page-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="employee.html" class="active">Clock In/Out</a>
        <a href="chef.html">Chef Orders</a>
        <a href="management.html">Management</a>
        <a href="inventory.html">Inventory</a>
        <a href="accounting.html">Accounting</a>
      </nav>
    </aside>

    <main class="page-main">
      <h1 class="page-title">Employee Portal</h1>
      <section class="panel">
        <h2>Clock In/Out</h2>
        <label for="employeeName">Employee Name</label>
        <input id="employeeName" type="text" required>

        <label for="employeePosition">Position</label>
        <select id="employeePosition" required>
          <option value="">Choose Position</option>
          <option value="Manager">Manager</option>
          <option value="Cashier">Cashier</option>
          <option value="Cook">Cook</option>
          <option value="Server">Server</option>
          <option value="Dishwasher">Dishwasher</option>
        </select>

        <div style="display:flex; gap:10px; margin-top:15px;">
          <button id="clockInBtn">Clock In</button>
          <button id="clockOutBtn" class="danger-btn">Clock Out</button>
        </div>

        <p id="employeeStatus" class="status-message">Status: Not clocked in.</p>
      </section>
    </main>
  </div>

  <footer class="footer">
    <img src="Assets/logo.png" alt="Parrilla Mexicana Logo" class="footer-image">
    <ul class="footerul">
      <li><a href="employeelogin.html">Jobs</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </footer>

  <script type="module" src="employee.js"></script>
</body>
</html>
